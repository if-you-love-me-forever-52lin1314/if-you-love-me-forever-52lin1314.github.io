<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
            padding:20px 0;
        }
        .login-box{
            background:#fff;padding:50px 40px;border-radius:20px;
            width:90%;max-width:520px;box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h2{text-align:center;margin-bottom:40px;color:#222;font-weight:600;}
        .item{margin-bottom:25px;}
        label{display:block;margin-bottom:8px;color:#555;font-size:15px;}
        input{
            width:100%;padding:14px 16px;border:1px solid #ddd;
            border-radius:8px;font-size:16px;outline:none;transition:0.3s;
        }
        input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15);}
        .login-btn{
            width:100%;padding:15px;border:none;border-radius:8px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:17px;cursor:pointer;transition:0.3s;
        }
        .login-btn:hover{opacity:0.9;}
        .reg-text{text-align:center;margin-top:25px;color:#666;font-size:15px;}
        .reg-text a{color:#667eea;text-decoration:none;cursor:pointer;}

        /* 注册弹窗容器 */
        .reg-wrap{
            width:100%;
            height: 650px; /* 加高，完整容纳全部表单 */
            margin-top:30px;
            display:none;
            overflow:hidden;
            border-radius:12px;
            border:1px solid #eee;
            position:relative;
        }
        /* 隐藏WPS多余头部和侧边栏，只保留表单主体 */
        .reg-wrap::after{
            content:"";
            position:absolute;
            top:0;left:0;right:0;
            height:90px; /* 裁掉顶部WPS标题栏 */
            background:#fff;
            z-index:9;
        }
        .reg-iframe{
            width:calc(100% + 80px);
            height:calc(100% + 150px);
            border:none;
            margin-left:-80px;
            margin-top:-90px; /* 上移避开顶部遮挡 */
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>账号登录</h2>

    <div class="item">
        <label>账号</label>
        <input type="text" id="user" placeholder="手机号/用户名">
    </div>
    <div class="item">
        <label>密码</label>
        <input type="password" id="pwd" placeholder="请输入密码">
    </div>

    <button class="login-btn" onclick="loginGo()">立即登录</button>

    <div class="reg-text">
        还没有账号？ <a onclick="openReg()">立即注册</a>
    </div>

    <!-- 内嵌修复后的完整注册表单 -->
    <div class="reg-wrap" id="regBox">
        <iframe class="reg-iframe" src="https://f.kdocs.cn/g/dlLFQoSv/"></iframe>
    </div>

</div>

<script>
// 登录跳转
function loginGo(){
    let user = document.getElementById('user').value.trim();
    let pwd = document.getElementById('pwd').value.trim();
    if(!user || !pwd){
        alert('请输入账号和密码');
        return;
    }
    alert('✅ 登录成功');
    location.href = "https://8888888.best/index.html";
}

// 打开注册面板
function openReg(){
    document.getElementById('regBox').style.display = 'block';
}
</script>
</body>
</html>
