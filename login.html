<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
        }
        .login-box{
            background:#fff;padding:50px 40px;border-radius:20px;
            width:90%;max-width:460px;box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h2{text-align:center;margin-bottom:40px;color:#222;font-weight:600;}
        .item{margin-bottom:25px;}
        label{display:block;margin-bottom:8px;color:#555;font-size:15px;}
        input{
            width:100%;padding:14px 16px;border:1px solid #ddd;
            border-radius:8px;font-size:16px;outline:none;transition:0.3s;
        }
        input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15);}
        .forget-link{text-align:right;margin:-8px 0 30px 0;}
        .forget-link a{color:#667eea;text-decoration:none;font-size:14px;}
        .login-btn{
            width:100%;padding:15px;border:none;border-radius:8px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:17px;cursor:pointer;transition:0.3s;
        }
        .login-btn:hover{opacity:0.9;}
        .reg-text{text-align:center;margin-top:25px;color:#666;font-size:15px;}
        .reg-text a{color:#667eea;text-decoration:none;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layer@3.5.1/dist/layer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2/dist/iife/index.min.js"></script>
</head>
<body>
<div class="login-box">
    <h2>账号登录</h2>
    <div class="item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入自定义账号">
    </div>
    <div class="item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="forget-link">
        <a href="javascript:findPwd()">忘记密码？</a>
    </div>
    <button class="login-btn" onclick="userLogin()">立即登录</button>
    <div class="reg-text">
        还没有账号？ <a href="javascript:userRegister()">立即注册</a>
    </div>
</div>

<script>
const client = new Appwrite.Client();
client
    .setEndpoint("https://sgp.cloud.appwrite.io/v1")
    .setProject("69e604b100164e6fb8dc");

const account = new Appwrite.Account(client);

// 登录
async function userLogin(){
    let user = $("#username").val().trim();
    let pwd = $("#password").val().trim();
    if(!user || !pwd){
        layer.msg("请填写账号和密码");
        return;
    }
    layer.load(1);
    try{
        await account.createEmailPasswordSession(user + "@temp.com", pwd);
        layer.closeAll();
        layer.msg("✅ 登录成功！",{icon:1,time:1500},()=>{
            location.href="https://8888888.best/index.html";
        })
    }catch(e){
        layer.closeAll();
        console.log(e);
        layer.msg("❌ 登录失败：账号或密码错误",{icon:2});
    }
}

// 注册
async function userRegister(){
    let username = prompt("请输入注册账号：");
    if(!username) return layer.msg("账号不能为空");
    let pwd = prompt("请输入登录密码：");
    if(!pwd || pwd.length < 4) return layer.msg("密码至少4位");

    layer.load(1);
    try{
        await account.create(
            Appwrite.ID.unique(),
            username+"@temp.com",
            pwd,
            username
        );
        layer.closeAll();
        layer.msg("🎉 注册成功！可以直接登录了",{icon:1});
    }catch(e){
        layer.closeAll();
        console.log(e);
        if(e.type == "user_already_exists"){
            layer.msg("⚠️ 该账号已经被注册",{icon:2});
        }else{
            layer.msg("❌ 注册失败：" + e.message,{icon:2});
        }
    }
}

function findPwd(){
    layer.msg("请联系管理员重置密码");
}
</script>
</body>
</html>
