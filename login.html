<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员登录中心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:url("https://pic.163.com/tu/2025/04/01/16/20250401161549_78228.jpg") center center / cover no-repeat fixed;
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
            position:relative;
        }
        body::before{
            content:"";
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.4);
            z-index:0;
        }
        .login-box{
            background:rgba(255, 255, 255, 0.25);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            padding:50px 40px;
            border-radius:20px;
            width:90%;max-width:460px;
            border:1px solid rgba(255,255,255,0.3);
            box-shadow:0 8px 32px rgba(255, 105, 180, 0.3);
            position:relative;z-index:1;
        }
        h2{
            text-align:center;
            margin-bottom:10px;
            color:#fff;
            font-weight:600;
            font-size:28px;
            text-shadow:0 0 10px rgba(255,105,180,0.5);
        }
        .tips{
            text-align:center;
            color:#fff;
            font-size:13px;
            margin-bottom:30px;
            background:rgba(255, 60, 140, 0.3);
            padding:8px 10px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,0.2);
        }
        .item{margin-bottom:25px;}
        label{
            display:block;
            margin-bottom:8px;
            color:#fff;
            font-size:15px;
            text-shadow:0 1px 3px rgba(0,0,0,0.3);
        }
        input{
            width:100%;
            padding:14px 16px;
            border:1px solid rgba(255,255,255,0.4);
            border-radius:10px;
            font-size:16px;
            outline:none;
            transition:0.3s;
            background:rgba(255,255,255,0.2);
            color:#fff;
        }
        input::placeholder{color:rgba(255,255,255,0.7);}
        input:focus{
            border-color:#ff69b4;
            box-shadow:0 0 10px rgba(255,105,180,0.5);
            background:rgba(255,255,255,0.25);
        }
        .forget-link{
            text-align:right;
            margin:-8px 0 20px 0;
        }
        .forget-link a{
            color:#ffbde6;
            text-decoration:none;
            font-size:14px;
        }
        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 4px 15px rgba(255,105,180,0.4);
        }
        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(255,105,180,0.6);
        }
        .reg-text{
            text-align:center;
            margin-top:25px;
            color:#fff;
            font-size:15px;
        }
        .reg-text a{
            color:#ffbde6;
            font-weight:bold;
            text-decoration:none;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2> 会员登录中心</h2>
    <div class="tips">
        注册规则：密码最少 8 位，账号随意<br>
        请牢记您的账号和密码
    </div>
    <div class="item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入您的账号">
    </div>
    <div class="item">
        <label>密码（最少8位）</label>
        <input type="password" id="password" placeholder="请输入密码（必须≥8位）">
    </div>
    <div class="forget-link">
        <a href="javascript:findPwd()">忘记密码？</a>
    </div>
    <button class="login-btn" onclick="userLogin()">立即登录</button>
    <div class="reg-text">
        还没有账号？ <a href="javascript:userRegister()">立即注册</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layer@3.5.1/dist/layer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>

<script>
const client = new Appwrite.Client();
client
    .setEndpoint("https://sgp.cloud.appwrite.io/v1")
    .setProject("69e604b100164e6fb8dc");

const account = new Appwrite.Account(client);

// 登录
async function userLogin(){
    let user = $("#username").val().trim();
    let pwd = $("#password").val().trim();
    if(!user || !pwd){
        alert("请填写账号和密码");
        return;
    }
    try{
        await account.createEmailPasswordSession(user + "@temp.com", pwd);
        alert("✅ 登录成功！");
        location.href="https://8888888.best/index.html";
    }catch(e){
        console.log(e);
        alert("❌ 登录失败：账号或密码错误");
    }
}

// 注册
async function userRegister(){
    let username = prompt("请输入注册账号：");
    if(!username) {alert("账号不能为空");return;}
    
    let pwd = prompt("请设置密码（必须最少 8 位！）");
    if(!pwd || pwd.length < 8) {
        alert("密码长度不足！请输入最少 8 位密码");
        return;
    }

    try{
        await account.create(
            Appwrite.ID.unique(),
            username.trim()+"@temp.com",
            pwd,
            username.trim()
        );
        alert("🎉 注册成功！现在可以直接登录");
    }catch(e){
        console.log(e);
        if(e.type == "user_already_exists"){
            alert("⚠️ 该账号已经被注册，请换一个");
        }else{
            alert("❌ 注册失败：密码必须≥8位");
        }
    }
}

function findPwd(){
    alert("请联系管理员重置密码");
}
</script>
</body>
</html>
