<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>笒鬼鬼音乐播放器 - 登录</title>
    <link rel="stylesheet" href="/Static/login/newUi2023/css/style.css">
    <script src="https://cdn.bytedance.com/cdn/font-awesome/6.0.0/js/all.min.js"></script>
</head>
<body>
    <img src="/Static/login/newUi2023/img/wave.svg" class="wave">
    <div class="container">
        <div class="img">
            <img src="/Static/login/newUi2023/img/music-picture.svg">
        </div>
        <div class="login-content">
            <form id="login">
                <img src="/Static/login/newUi2023/img/avatar.svg" alt="头像">
                <h2 class="title">登 录</h2>
                <div class="input-div one">
                    <div class="i"><i class="fas fa-user"></i></div>
                    <div class="div">
                        <h5>用户名</h5>
                        <input class="input" type="text" name="username" autocomplete="off">
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i"><i class="fas fa-lock"></i></div>
                    <div class="div">
                        <h5>密码</h5>
                        <input class="input" type="password" name="password" autocomplete="off">
                    </div>
                </div>
                <div class="btn-account">
                    <a href="javascript:register()">注册账号</a>
                    <a href="javascript:alert('联系管理员重置')">忘记密码?</a>
                </div>
                <div class="btn" onclick="login()">登 录</div>
            </form>
        </div>
    </div>

    <script src="https://cdn.bytedance.com/cdn/jquery/3.5.1/jquery.min.js"></script>
    <script src="/Static/layer/layer.js"></script>

    <!-- Appwrite -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@15/dist/iife/index.min.js"></script>
    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint("https://sgp.cloud.appwrite.io/v1")
            .setProject("69e604b100164e6fb8dc");

        const account = new Appwrite.Account(client);

        // 登录
        async function login() {
            let u = $("input[name=username]").val().trim();
            let p = $("input[name=password]").val().trim();
            if (!u || !p) return layer.msg("请输入账号密码", { icon: 5 });

            layer.msg("登录中…", { icon: 16 });
            try {
                await account.createEmailPasswordSession(u + "@app.com", p);
                layer.msg("登录成功", { icon: 6 }, () => {
                    location.href = "/index/home/index.html";
                });
            } catch (e) {
                layer.msg("账号或密码错误", { icon: 5 });
            }
        }

        // 注册
        async function register() {
            let u = prompt("输入用户名：");
            let p = prompt("输入密码：");
            if (!u || !p) return;

            try {
                await account.create(Appwrite.ID.unique(), u + "@app.com", p, u);
                layer.msg("注册成功！请登录", { icon: 6 });
            } catch (e) {
                layer.msg("用户名已存在", { icon: 5 });
            }
        }
    </script>
</body>
</html>
