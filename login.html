<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
        }
        .login-box{
            background:#fff;padding:50px 40px;border-radius:20px;
            width:90%;max-width:460px;
            box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h2{text-align:center;margin-bottom:40px;color:#222;font-weight:600;}
        .item{margin-bottom:25px;}
        label{display:block;margin-bottom:8px;color:#555;font-size:15px;}
        input{
            width:100%;padding:14px 16px;border:1px solid #ddd;
            border-radius:8px;font-size:16px;outline:none;
        }
        input:focus{border-color:#667eea;}
        .forget-link{text-align:right;margin:-8px 0 30px 0;}
        .forget-link a{color:#667eea;text-decoration:none;font-size:14px;}
        .login-btn{
            width:100%;padding:15px;border:none;border-radius:8px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:17px;cursor:pointer;
        }
        .reg-text{text-align:center;margin-top:25px;color:#666;font-size:15px;}
        .reg-text a{color:#667eea;text-decoration:none;}
    </style>
</head>
<body>
<div class="login-box">
    <h2>账号登录</h2>
    <div class="item">
        <label>用户名/手机号</label>
        <input type="text" id="username" placeholder="请输入账号">
    </div>
    <div class="item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="forget-link">
        <a href="javascript:alert('请联系管理员重置')">忘记密码？</a>
    </div>
    <button class="login-btn" onclick="alert('登录成功');location.href='https://8888888.best/index.html'">
        立即登录
    </button>
    <div class="reg-text">
        还没有账号？
        <a href="https://f.kdocs.cn/g/dlLFQoSv/" target="_blank">立即注册</a>
    </div>
</div>
</body>
</html>
