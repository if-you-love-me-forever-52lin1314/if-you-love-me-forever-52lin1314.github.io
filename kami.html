<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>52霖科技 - 卡密管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
    :root { --primary: #ff69b4; --primary-dark: #ff1493; --bg: #fdf2f8; --card-bg: rgba(255,255,255,0.95); --text: #333; --text-light: #666; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --border: rgba(255,105,180,0.3); }
    body { background: linear-gradient(135deg, #fdf2f8 0%, #e9d5ff 100%); min-height: 100vh; padding: 20px; color: var(--text); }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; padding: 20px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(255,105,180,0.2); }
    .header h1 { color: var(--primary-dark); font-size: 28px; margin-bottom: 10px; }
    .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(255,105,180,0.2); }
    .login-box h2 { text-align: center; color: var(--primary-dark); margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text); }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.8); transition: all 0.3s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,105,180,0.1); }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,20,147,0.4); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(255,105,180,0.1); }
    .card h3 { color: var(--primary-dark); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-item { padding: 15px; background: linear-gradient(135deg, rgba(255,105,180,0.1), rgba(233,213,255,0.2)); border-radius: 12px; text-align: center; }
    .stat-item .num { font-size: 28px; font-weight: bold; color: var(--primary-dark); margin-bottom: 5px; }
    .stat-item .label { font-size: 14px; color: var(--text-light); }
    .tabs { display: flex; gap: 2px; background: rgba(255,105,180,0.1); border-radius: 8px; padding: 4px; margin-bottom: 20px; }
    .tab-item { flex: 1; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
    .tab-item.active { background: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; overflow-x: auto; display: block; }
    thead { background: rgba(255,105,180,0.1); }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; }
    th { color: var(--primary-dark); font-weight: 600; }
    .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 15px; align-items: center; }
    .status-tag { padding: 3px 8px; border-radius: 4px; font-size: 12px; color: white; }
    .status-active { background: var(--success); }
    .status-inactive { background: var(--warning); }
    .status-expired { background: var(--danger); }
    .status-banned { background: #666; }
    .ad-item { padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
    .hide { display: none; }
  </style>
</head>
<body>
  <!-- ===================== 【小白仅需修改这里】你的Worker地址 ===================== -->
  <script>
    const API_BASE_URL = "https://kami.8888888.best"; // 替换为你的Worker地址
    // ==========================================================================
    
    let adminKey = localStorage.getItem("adminKey") || "";
    let currentPage = 1;
    let pageSize = 50;
    let appGroups = {};
  </script>

  <!-- 登录页面 -->
  <div id="loginPage" class="login-box">
    <h2>💖 52霖科技管理后台登录 💖</h2>
    <div class="form-group">
      <label>管理员密钥</label>
      <input type="password" id="adminKeyInput" placeholder="请输入管理员密钥">
    </div>
    <button class="btn btn-primary" style="width: 100%;" onclick="login()">登录</button>
  </div>

  <!-- 主管理页面 -->
  <div id="mainPage" class="container" style="display: none;">
    <div class="header">
      <h1>💖 52霖科技 - 卡密验证管理系统 💖</h1>
      <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>

    <!-- 数据统计看板 -->
    <div class="card">
      <h3>📊 数据统计</h3>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-item"><div class="num" id="totalCards">0</div><div class="label">总卡密数</div></div>
        <div class="stat-item"><div class="num" id="activeCards">0</div><div class="label">已激活用户</div></div>
        <div class="stat-item"><div class="num" id="inactiveCards">0</div><div class="label">未激活卡密</div></div>
        <div class="stat-item"><div class="num" id="expiredCards">0</div><div class="label">已过期卡密</div></div>
        <div class="stat-item"><div class="num" id="bannedCards">0</div><div class="label">已封禁卡密</div></div>
      </div>
    </div>

    <!-- 功能标签页 -->
    <div class="tabs">
      <div class="tab-item active" onclick="switchTab('cardManage')">卡密管理</div>
      <div class="tab-item" onclick="switchTab('cardGenerate')">生成卡密</div>
      <div class="tab-item" onclick="switchTab('groupManage')">APP分组管理</div>
    </div>

    <!-- 卡密管理标签页 -->
    <div id="cardManage" class="tab-content active">
      <div class="card">
        <h3>🔍 卡密筛选</h3>
        <div class="grid-2">
          <div class="form-group">
            <label>关键词搜索（卡密/名称）</label>
            <input type="text" id="searchKeyword" placeholder="请输入关键词">
          </div>
          <div class="form-group">
            <label>卡密状态</label>
            <select id="searchStatus">
              <option value="all">全部</option>
              <option value="active">已激活</option>
              <option value="inactive">未激活</option>
              <option value="expired">已过期</option>
              <option value="banned">已封禁</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>授权分组筛选</label>
          <select id="searchGroupId">
            <option value="all">全部分组</option>
          </select>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="loadCardList()">搜索</button>
          <button class="btn btn-warning" onclick="cleanExpired()">清理过期卡密</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>卡密内容</th>
              <th>卡密名称</th>
              <th>授权分组</th>
              <th>创建时间</th>
              <th>到期时间</th>
              <th>激活APP列表</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="cardTableBody"></tbody>
        </table>

        <div class="pagination">
          <button class="btn btn-primary" onclick="prevPage()" id="prevBtn">上一页</button>
          <span>第 <span id="currentPageText">1</span> 页 / 共 <span id="totalPageText">0</span> 页</span>
          <button class="btn btn-primary" onclick="nextPage()" id="nextBtn">下一页</button>
        </div>
      </div>
    </div>

    <!-- 生成卡密标签页 -->
    <div id="cardGenerate" class="tab-content">
      <div class="card">
        <h3>🎫 生成卡密</h3>
        <div class="grid-2">
          <div class="form-group">
            <label>卡密名称（必填，如：月卡-普通用户）</label>
            <input type="text" id="cardName" placeholder="月卡">
          </div>
          <div class="form-group">
            <label>有效期（天，必填）</label>
            <input type="number" id="cardDays" value="30" placeholder="30">
          </div>
        </div>
        <div class="form-group">
          <label>授权APP分组（必填）</label>
          <select id="cardGroupId">
            <option value="default">请先创建分组</option>
          </select>
        </div>
        <div class="form-group">
          <label>生成方式</label>
          <select id="generateMode" onchange="toggleGenerateMode()">
            <option value="auto">自动批量生成</option>
            <option value="custom">自定义卡密</option>
          </select>
        </div>
        <div id="autoMode">
          <div class="grid-2">
            <div class="form-group">
              <label>生成数量</label>
              <input type="number" id="generateCount" value="1" placeholder="1">
            </div>
            <div class="form-group">
              <label>卡密前缀（可选）</label>
              <input type="text" id="cardPrefix" placeholder="VIP-">
            </div>
          </div>
          <div class="form-group">
            <label>卡密后缀（可选）</label>
            <input type="text" id="cardSuffix" placeholder="-2026">
          </div>
        </div>
        <div id="customMode" class="hide">
          <div class="form-group">
            <label>自定义卡密（一行一个，如：123456、abc123456）</label>
            <textarea id="customCards" rows="8" placeholder="123456&#10;abc123456&#10;52lin-vip-001"></textarea>
          </div>
        </div>
        <button class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;" onclick="generateCards()">生成卡密</button>
      </div>
    </div>

    <!-- APP分组管理标签页 -->
    <div id="groupManage" class="tab-content">
      <div class="card">
        <h3>📱 APP分组管理</h3>
        <p style="margin-bottom: 15px; color: var(--text-light);">先在这里配置你的8款APP和分组，生成卡密时选择分组即可</p>
        <div class="form-group">
          <label>所有APP列表（一行一个，直接复制下面的8个APP ID粘贴进去）</label>
          <textarea id="allAppIds" rows="8" placeholder="52霖影视-APP1&#10;52霖漫画-APP2&#10;52霖小说-APP3&#10;52霖动漫-APP4&#10;52霖短剧-APP5&#10;52霖音乐-APP6&#10;52霖游戏-APP7&#10;52霖工具-APP8"></textarea>
        </div>
        <hr style="margin: 15px 0; border-color: var(--border);">
        <h4>分组列表</h4>
        <div id="groupList"></div>
        <button class="btn btn-primary" style="margin-top: 10px;" onclick="addAppGroup()">+ 添加分组</button>
        <button class="btn btn-success" style="margin-top: 10px; margin-left: 10px;" onclick="saveAllGroups()">保存所有配置</button>
      </div>
    </div>
  </div>

  <script>
    // ===================== 通用函数 =====================
    function switchTab(tabId) {
      document.querySelectorAll(".tab-item").forEach(item => item.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(item => item.classList.remove("active"));
      event.target.classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }
    function toggleGenerateMode() {
      const mode = document.getElementById("generateMode").value;
      document.getElementById("autoMode").classList.toggle("hide", mode !== "auto");
      document.getElementById("customMode").classList.toggle("hide", mode !== "custom");
    }
    function logout() {
      localStorage.removeItem("adminKey");
      adminKey = "";
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("loginPage").style.display = "block";
    }

    // ===================== 登录 =====================
    async function login() {
      const key = document.getElementById("adminKeyInput").value.trim();
      if (!key) { alert("请输入管理员密钥"); return; }
      try {
        const res = await fetch(`${API_BASE_URL}/admin/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey: key })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        adminKey = key;
        localStorage.setItem("adminKey", key);
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        loadAppGroups();
        loadCardList();
      } catch (e) { alert("登录失败：" + e.message); }
    }

    // ===================== APP分组管理 =====================
    async function loadAppGroups() {
      try {
        const res = await fetch(`${API_BASE_URL}/admin/groups/list`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        appGroups = data.data;
        renderGroupList();
        updateGroupSelects();
      } catch (e) { alert("加载APP分组失败：" + e.message); }
    }
    function renderGroupList() {
      const groupList = document.getElementById("groupList");
      groupList.innerHTML = "";
      Object.entries(appGroups).forEach(([groupId, group]) => {
        const groupItem = document.createElement("div");
        groupItem.className = "ad-item";
        groupItem.innerHTML = `
          <div class="grid-2">
            <div class="form-group">
              <label>分组名称</label>
              <input type="text" class="group-name" value="${group.name || ""}" placeholder="基础VIP组">
            </div>
            <div class="form-group">
              <label>包含APP（按住Ctrl多选）</label>
              <select class="group-apps" multiple style="height: 100px;">
                ${getAllAppIdsOptions(group.appIds || [])}
              </select>
            </div>
          </div>
          <button class="btn btn-danger" onclick="deleteAppGroup('${groupId}')">删除此分组</button>
        `;
        groupList.appendChild(groupItem);
      });
    }
    function getAllAppIdsOptions(selectedApps = []) {
      const allAppIdsText = document.getElementById("allAppIds").value.trim();
      const allAppIds = allAppIdsText ? allAppIdsText.split("\n").map(id => id.trim()).filter(id => id) : [];
      return allAppIds.map(appId => 
        `<option value="${appId}" ${selectedApps.includes(appId) ? "selected" : ""}>${appId}</option>`
      ).join("");
    }
    function updateGroupSelects() {
      const groupSelect = document.getElementById("cardGroupId");
      const searchGroupSelect = document.getElementById("searchGroupId");
      const options = Object.entries(appGroups).map(([groupId, group]) => 
        `<option value="${groupId}">${group.name}</option>`
      ).join("");
      if (groupSelect) groupSelect.innerHTML = options || '<option value="default">请先创建分组</option>';
      if (searchGroupSelect) searchGroupSelect.innerHTML = '<option value="all">全部分组</option>' + options;
    }
    function addAppGroup() {
      const groupId = "group_" + Date.now();
      appGroups[groupId] = { name: "", appIds: [] };
      renderGroupList();
    }
    function deleteAppGroup(groupId) {
      if (!confirm("确定要删除此分组吗？")) return;
      delete appGroups[groupId];
      renderGroupList();
    }
    async function saveAllGroups() {
      const groupItems = document.querySelectorAll("#groupList .ad-item");
      const groupIds = Object.keys(appGroups);
      groupItems.forEach((item, index) => {
        const groupId = groupIds[index];
        const name = item.querySelector(".group-name").value.trim();
        const appSelect = item.querySelector(".group-apps");
        const appIds = Array.from(appSelect.selectedOptions).map(opt => opt.value);
        appGroups[groupId] = { name, appIds };
      });
      try {
        const res = await fetch(`${API_BASE_URL}/admin/groups/save`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey, groups: appGroups })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        alert(data.msg);
        updateGroupSelects();
        loadCardList();
      } catch (e) { alert("保存失败：" + e.message); }
    }

    // ===================== 卡密管理 =====================
    async function loadCardList() {
      const keyword = document.getElementById("searchKeyword").value.trim();
      const status = document.getElementById("searchStatus").value;
      const groupId = document.getElementById("searchGroupId")?.value || "all";
      try {
        const res = await fetch(`${API_BASE_URL}/admin/cards/list`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey, page: currentPage, pageSize, keyword, status, groupId })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }

        const stats = data.data.stats;
        document.getElementById("totalCards").textContent = stats.totalCards;
        document.getElementById("activeCards").textContent = stats.activeCards;
        document.getElementById("inactiveCards").textContent = stats.inactiveCards;
        document.getElementById("expiredCards").textContent = stats.expiredCards;
        document.getElementById("bannedCards").textContent = stats.bannedCards;

        if (data.data.appGroups) {
          appGroups = data.data.appGroups;
          updateGroupSelects();
        }

        const tbody = document.getElementById("cardTableBody");
        tbody.innerHTML = "";
        data.data.list.forEach(item => {
          let statusText = "";
          let statusClass = "";
          const now = Date.now();
          if (item.status === "banned") { statusText = "已封禁"; statusClass = "status-banned"; }
          else if (item.expireTime < now) { statusText = "已过期"; statusClass = "status-expired"; }
          else if (!item.appBindings || Object.keys(item.appBindings).length === 0) { statusText = "未激活"; statusClass = "status-inactive"; }
          else { statusText = "已激活"; statusClass = "status-active"; }

          let activatedAppsText = "-";
          if (item.appBindings && Object.keys(item.appBindings).length > 0) {
            activatedAppsText = Object.keys(item.appBindings).map(appId => {
              const activateTime = item.activateTimes?.[appId] ? new Date(item.activateTimes[appId]).toLocaleString() : "-";
              const lastOnline = item.lastOnlineTimes?.[appId] ? new Date(item.lastOnlineTimes[appId]).toLocaleString() : "-";
              return `${appId}<br><small>激活:${activateTime}<br>在线:${lastOnline}</small>`;
            }).join("<br><br>");
          }

          const groupName = appGroups[item.appGroupId]?.name || "未知分组";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.card}</td>
            <td>${item.name}</td>
            <td>${groupName}</td>
            <td>${item.createTimeText}</td>
            <td>${item.expireTimeText}</td>
            <td>${activatedAppsText}</td>
            <td><span class="status-tag ${statusClass}">${statusText}</span></td>
            <td>
              <div class="btn-group">
                ${item.status === "banned" 
                  ? `<button class="btn btn-success" onclick="changeCardStatus('${item.card}', 'unban')">解封</button>`
                  : `<button class="btn btn-warning" onclick="changeCardStatus('${item.card}', 'ban')">封禁</button>`
                }
                <button class="btn btn-danger" onclick="deleteCard('${item.card}')">删除</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });

        const totalPage = Math.ceil(data.data.total / pageSize);
        document.getElementById("currentPageText").textContent = currentPage;
        document.getElementById("totalPageText").textContent = totalPage;
        document.getElementById("prevBtn").disabled = currentPage <= 1;
        document.getElementById("nextBtn").disabled = currentPage >= totalPage;
      } catch (e) { alert("加载失败：" + e.message); }
    }
    function prevPage() { if (currentPage > 1) { currentPage--; loadCardList(); } }
    function nextPage() { currentPage++; loadCardList(); }
    async function generateCards() {
      const cardName = document.getElementById("cardName").value.trim();
      const days = parseInt(document.getElementById("cardDays").value);
      const mode = document.getElementById("generateMode").value;
      const appGroupId = document.getElementById("cardGroupId").value;
      if (!cardName || !days || !appGroupId) { alert("请填写卡密名称、有效期并选择授权分组"); return; }
      const body = { adminKey, cardName, days, appGroupId };
      if (mode === "auto") {
        body.count = parseInt(document.getElementById("generateCount").value);
        body.prefix = document.getElementById("cardPrefix").value.trim();
        body.suffix = document.getElementById("cardSuffix").value.trim();
      } else {
        body.customCards = document.getElementById("customCards").value.trim();
      }
      try {
        const res = await fetch(`${API_BASE_URL}/admin/cards/add`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        const cardList = data.cards.join("\n");
        alert(`${data.msg}\n\n卡密列表：\n${cardList}\n\n已自动复制到剪贴板`);
        await navigator.clipboard.writeText(cardList);
        loadCardList();
      } catch (e) { alert("生成失败：" + e.message); }
    }
    async function deleteCard(card) {
      if (!confirm(`确定要删除卡密【${card}】吗？此操作不可恢复！`)) return;
      try {
        const res = await fetch(`${API_BASE_URL}/admin/cards/delete`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey, card })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        alert("删除成功");
        loadCardList();
      } catch (e) { alert("删除失败：" + e.message); }
    }
    async function changeCardStatus(card, action) {
      const text = action === "ban" ? "封禁" : "解封";
      if (!confirm(`确定要${text}卡密【${card}】吗？`)) return;
      try {
        const res = await fetch(`${API_BASE_URL}/admin/cards/ban`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey, card, action })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        alert(`${text}成功`);
        loadCardList();
      } catch (e) { alert(`${text}失败：` + e.message); }
    }
    async function cleanExpired() {
      if (!confirm("确定要清理所有过期卡密吗？此操作不可恢复！")) return;
      try {
        const res = await fetch(`${API_BASE_URL}/admin/cards/clean`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey })
        });
        const data = await res.json();
        if (data.code !== 200) { alert(data.msg); return; }
        alert(data.msg);
        loadCardList();
      } catch (e) { alert("清理失败：" + e.message); }
    }

    // 页面加载时检查登录状态
    window.onload = () => {
      if (adminKey) {
        document.getElementById("adminKeyInput").value = adminKey;
        login();
      }
    };
  </script>
</body>
</html>
