<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>52霖科技 - 顶级管理后台</title>
  <style>
    :root { --primary: #ff758c; --bg: #0f0c29; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 1100px; margin: 20px auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 15px; }
    h1 { text-align: center; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
    .tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid #444; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 5px 5px 0 0; }
    .tab.active { background: var(--primary); color: white; }
    .tab-content { display: none; padding: 20px 0; }
    .tab-content.active { display: block; }
    input, select, textarea { background: rgba(255,255,255,0.1); border: 1px solid #555; color: white; padding: 8px; border-radius: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
    .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-pink { background: var(--primary); color: white; }
    .btn-red { background: #ff4b2b; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: rgba(255,117,140,0.2); padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
    .online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ff88; margin-right: 5px; box-shadow: 0 0 5px #00ff88; }
    .offline-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #666; margin-right: 5px; }
    .edit-link { color: #ffeb3b; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="container">
    <h1>💖 52霖科技卡密系统 💖</h1>

    <div id="loginBox" style="text-align:center;">
      <input type="password" id="adminKey" placeholder="输入后台管理密钥" style="width:250px;">
      <button class="btn btn-pink" onclick="init()">登录系统</button>
    </div>

    <div id="mainBox" style="display:none;">
      <div class="tabs">
        <div class="tab active" onclick="showTab(0)">卡密管理</div>
        <div class="tab" onclick="showTab(1)">添加卡密</div>
        <div class="tab" onclick="showTab(2)">分组设置</div>
      </div>

      <div id="tab0" class="tab-content active">
        <div style="margin-bottom:10px;">
          今日活跃: <span id="sOnline">0</span> | 总数: <span id="sTotal">0</span>
          <button class="btn btn-red" style="float:right;" onclick="batchDel()">批量删除勾选</button>
        </div>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" onchange="checkAll(this)"></th>
              <th>卡密</th>
              <th>名称</th>
              <th>时长</th>
              <th>激活状态</th>
              <th>到期时间</th>
              <th>在线</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>

      <div id="tab1" class="tab-content">
        <div style="max-width: 400px;">
          <label>卡密名称:</label><input type="text" id="cName" placeholder="月卡">
          <label>有效天数:</label><input type="number" id="cDays" value="30">
          <label>生成方式:</label>
          <select id="cType" onchange="toggleGen(this.value)">
            <option value="auto">系统随机批量生成</option>
            <option value="manual">手动粘贴自定义卡密</option>
          </select>
          <div id="autoPart">
            数量: <input type="number" id="cCount" value="5">
            前缀: <input type="text" id="cPrefix" placeholder="52LIN-">
          </div>
          <div id="manualPart" style="display:none;">
            输入卡密(一行一个):
            <textarea id="cManual" rows="5"></textarea>
          </div>
          <button class="btn btn-pink" onclick="add()">执行生成</button>
        </div>
      </div>

      <div id="tab2" class="tab-content">
        <div id="gList"></div>
        <button class="btn btn-pink" onclick="newG()">+ 新增分组</button>
        <button class="btn btn-pink" style="background:#00ff88; color:#000" onclick="saveG()">保存所有修改</button>
      </div>
    </div>
  </div>

  <script>
    const API = "https://kami.8888888.best"; // [重要] 改这里
    let groups = [];

    function showTab(i) {
      document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
      document.querySelectorAll('.tab-content').forEach((c,idx)=>c.classList.toggle('active',idx===i));
    }
    function toggleGen(v) {
      document.getElementById('autoPart').style.display = v==='auto'?'block':'none';
      document.getElementById('manualPart').style.display = v==='manual'?'block':'none';
    }

    async function init() {
      const adminKey = document.getElementById('adminKey').value;
      const res = await fetch(`${API}/admin/list`, { method:'POST', body: JSON.stringify({adminKey}) });
      const d = await res.json();
      if(d.code!==200) return alert(d.msg);
      
      document.getElementById('loginBox').style.display='none';
      document.getElementById('mainBox').style.display='block';
      document.getElementById('sOnline').innerText = d.stats.onlineToday;
      document.getElementById('sTotal').innerText = d.stats.total;
      
      const tStart = new Date().setHours(0,0,0,0);
      document.getElementById('list').innerHTML = d.data.map(i => `
        <tr>
          <td><input type="checkbox" class="cb" value="${i.card_key}"></td>
          <td>${i.card_key}</td>
          <td>${i.name}</td>
          <td><span class="edit-link" onclick="updateD('${i.card_key}',${i.days})">${i.days}天</span></td>
          <td>${i.device_id?'已激活':'未激活'}</td>
          <td>${i.expire_time>0?new Date(i.expire_time).toLocaleDateString():'-'}</td>
          <td><span class="${i.last_online_time>tStart?'online-dot':'offline-dot'}"></span></td>
        </tr>
      `).join('');
      groups = d.groups || [];
      renderG();
    }

    async function add() {
      const body = {
        adminKey: document.getElementById('adminKey').value,
        cardName: document.getElementById('cName').value,
        days: parseInt(document.getElementById('cDays').value),
        count: parseInt(document.getElementById('cCount').value),
        prefix: document.getElementById('cPrefix').value,
        customCards: document.getElementById('cManual').value
      };
      await fetch(`${API}/admin/add`, {method:'POST', body:JSON.stringify(body)});
      alert("成功"); init(); showTab(0);
    }

    async function updateD(key, old) {
      const n = prompt("输入新天数:", old);
      if(!n) return;
      await fetch(`${API}/admin/update-days`, {method:'POST', body:JSON.stringify({adminKey: document.getElementById('adminKey').value, key, newDays: parseInt(n)})});
      init();
    }

    async function batchDel() {
      const keys = Array.from(document.querySelectorAll('.cb:checked')).map(e=>e.value);
      if(!keys.length || !confirm("确定删除?")) return;
      await fetch(`${API}/admin/batch-delete`, {method:'POST', body:JSON.stringify({adminKey: document.getElementById('adminKey').value, keys})});
      init();
    }

    function renderG() {
      document.getElementById('gList').innerHTML = groups.map((g,i)=>`
        <div style="background:rgba(255,255,255,0.05); padding:10px; margin-bottom:10px; border-radius:5px;">
          ID: <input style="width:80px" value="${g.id}" onchange="groups[${i}].id=this.value">
          名: <input style="width:100px" value="${g.name}" onchange="groups[${i}].name=this.value">
          APP IDs (逗号隔开): <input style="width:200px" value="${JSON.parse(g.app_ids||'[]').join(',')}" onchange="groups[${i}].appIds=this.value.split(',')">
          <button class="btn btn-red" onclick="groups.splice(${i},1);renderG()">删</button>
        </div>
      `).join('');
    }
    function newG() { groups.push({id:'new_'+Date.now(), name:'新分组', appIds:[]}); renderG(); }
    async function saveG() {
      await fetch(`${API}/admin/group-save`, {method:'POST', body:JSON.stringify({adminKey: document.getElementById('adminKey').value, groups})});
      alert("保存成功");
    }
    function checkAll(s) { document.querySelectorAll('.cb').forEach(e=>e.checked=s.checked); }

    // 爱心特效
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const hearts = [];
    class Heart {
      constructor() { this.x = Math.random()*canvas.width; this.y = -20; this.size = Math.random()*12+8; this.speed = Math.random()*2+1; this.opacity = Math.random()*0.5+0.2; }
      draw() {
        ctx.fillStyle = `rgba(255, 117, 140, ${this.opacity})`;
        ctx.beginPath(); ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x-this.size/2, this.y-this.size/2, this.x-this.size, this.y+this.size/3, this.x, this.y+this.size);
        ctx.bezierCurveTo(this.x+this.size, this.y+this.size/3, this.x+this.size/2, this.y-this.size/2, this.x, this.y);
        ctx.fill();
      }
      update() { this.y += this.speed; if(this.y > canvas.height) this.y = -20; }
    }
    for(let i=0; i<40; i++) hearts.push(new Heart());
    function anim() { ctx.clearRect(0,0,canvas.width, canvas.height); hearts.forEach(h=>{h.update(); h.draw();}); requestAnimationFrame(anim); }
    anim();
  </script>
</body>
</html>
