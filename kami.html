<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>卡密管理系统</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(135deg,#ff9a9e 0%,#fad0c4 50%,#fecfef 100%);
  background-attachment:fixed;font-family:system-ui,sans-serif;color:#222}
.heart{position:fixed;width:12px;height:12px;background:#ff5e7d;
  transform:rotate(45deg);animation:fly 6s linear forwards;z-index:9999}
.heart:before,.heart:after{content:'';position:absolute;width:12px;height:12px;
  background:inherit;border-radius:50%}
.heart:before{top:-6px;left:0}
.heart:after{left:-6px;top:0}
@keyframes fly{0%{opacity:1;transform:translateY(0) rotate(45deg)}
  100%{opacity:0;transform:translateY(-100vh) rotate(45deg)}}
.card{background:rgba(255,255,255,0.85);border-radius:16px;box-shadow:0 0 20px rgba(255,94,125,0.2);
  padding:20px;margin-bottom:20px;border:1px solid rgba(255,94,125,0.1)}
.btn{background:#ff5e7d;color:white;border:none;border-radius:12px;padding:10px 16px;
  margin:4px;cursor:pointer;transition:all 0.2s}
.btn:hover{transform:scale(1.05);box-shadow:0 0 12px #ff5e7d}
input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;
  margin-bottom:10px;background:rgba(255,255,255,0.9)}
.table{width:100%;border-collapse:collapse;margin-top:10px}
.table th,.table td{padding:10px;text-align:left;border-bottom:1px solid #eee}
.table th{background:rgba(255,94,125,0.1)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal .box{background:white;border-radius:16px;max-width:500px;width:100%;padding:20px}
.tabs{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.tab{padding:10px 14px;border-radius:12px;background:#fff;cursor:pointer}
.tab.active{background:#ff5e7d;color:white}
.container{max-width:1200px;margin:0 auto;padding:20px}
</style>
</head>
<body>
<div class="container" id="app" style="display:none">
  <div class="card">
    <h2 style="margin:0;color:#ff5e7d">💕 卡密管理系统</h2>
    <div class="tabs">
      <div class="tab active" onclick="tab(0)">卡密管理</div>
      <div class="tab" onclick="tab(1)">生成卡密</div>
      <div class="tab" onclick="tab(2)">APP分组</div>
      <div class="tab" onclick="tab(3)">操作日志</div>
    </div>
  </div>

  <div id="t0" class="tab-content">
    <div class="card">
      <button class="btn" onclick="batch('del')">批量删除</button>
      <button class="btn" onclick="batch('ban')">批量封禁</button>
      <button class="btn" onclick="batch('unban')">批量解封</button>
      <button class="btn" onclick="exportCards()">导出卡密</button>
      <button class="btn" onclick="loadList()">刷新</button>
    </div>
    <div class="card"><div id="list"></div></div>
  </div>

  <div id="t1" class="tab-content" style="display:none">
    <div class="card">
      <input id="c-name" placeholder="卡密名称">
      <div style="display:flex;gap:10px">
        <input id="c-duration" type="number" placeholder="时长" style="width:60%">
        <select id="c-unit" style="width:40%">
          <option value="day">天</option>
          <option value="hour">小时</option>
          <option value="minute">分钟</option>
        </select>
      </div>
      <input id="c-count" type="number" placeholder="生成数量" value="1">
      <select id="c-mode"><option value="group">分组授权</option><option value="app">APP授权</option></select>
      <div id="app-list"></div>
      <select id="c-group"></select>
      <div style="display:flex;gap:10px">
        <label><input name="eff" type="radio" value="create" checked>创建生效</label>
        <label><input name="eff" type="radio" value="activate">激活生效</label>
      </div>
      <input id="c-max" type="number" placeholder="最大激活设备数(0不限制)" value="0">
      <button class="btn" onclick="generate()" style="width:100%">生成卡密</button>
    </div>
  </div>

  <div id="t2" class="tab-content" style="display:none">
    <div class="card">
      <input id="g-name" placeholder="分组名称">
      <div id="g-app-list"></div>
      <button class="btn" onclick="saveGroup()">保存分组</button>
    </div>
    <div class="card"><div id="group-list"></div></div>
  </div>

  <div id="t3" class="tab-content" style="display:none">
    <div class="card"><div id="logs"></div></div>
  </div>
</div>

<div id="login" class="modal">
  <div class="card" style="width:100%;max-width:400px">
    <h3 style="color:#ff5e7d;text-align:center">🔐 管理员登录</h3>
    <input id="key" type="password" placeholder="请输入管理员密钥">
    <button class="btn" onclick="login()" style="width:100%">登录</button>
  </div>
</div>

<script>
const API = "/api";
let token = "";
let tabIndex = 0;
let groups = [], apps = ["APP_1","APP_2","APP_3","APP_4"];

function createHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = Math.random() * 3 + 4 + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}
setInterval(createHeart, 300);

async function login() {
  const k = document.getElementById("key").value;
  const r = await fetch(API+"/admin/login", { method:"POST", body:JSON.stringify({adminKey:k}) });
  const j = await r.json();
  if (j.code === 200) { token = k; document.getElementById("login").remove(); document.getElementById("app").style.display = "block"; loadAll(); }
  else alert("密钥错误");
}

function tab(i) {
  tabIndex = i;
  document.querySelectorAll(".tab").forEach((e,j) => e.classList.toggle("active",j===i));
  document.querySelectorAll(".tab-content").forEach((e,j) => e.style.display = j===i?"block":"none");
}

async function loadAll() { loadGroups(); loadList(); loadLogs(); }

async function loadGroups() {
  const r = await fetch(API+"/admin/groups/list", { method:"POST", body:JSON.stringify({adminKey:token}) });
  const j = await r.json();
  groups = j.data || [];
  const sel = document.getElementById("c-group");
  sel.innerHTML = groups.map(g => `<option value="${g.group_id}">${g.name}</option>`).join("");
}

async function loadList() {
  const r = await fetch(API+"/admin/cards/list", { method:"POST", body:JSON.stringify({adminKey:token}) });
  const j = await r.json();
  const list = j.data || [];
  document.getElementById("list").innerHTML = `
  <table class="table">
    <tr><th><input type="checkbox" id="checkAll"></th><th>卡密</th><th>名称</th><th>状态</th><th>激活/设备</th><th>到期时间</th><th>操作</th></tr>
    ${list.map(c => `
    <tr>
      <td><input type="checkbox" class="card-item" value="${c.card}"></td>
      <td>${c.card}</td>
      <td>${c.name}</td>
      <td>${c.status==='banned'?'封禁':'正常'}</td>
      <td>${Object.keys(JSON.parse(c.device_ids||'{}')).length}</td>
      <td>${new Date(c.expire_time).toLocaleString()}</td>
      <td>
        <button class="btn" onclick="renew('${c.card}')">续期</button>
      </td>
    </tr>`).join("")}
  </table>`;
}

async function generate() {
  const name = document.getElementById("c-name").value;
  const duration = document.getElementById("c-duration").value;
  const unit = document.getElementById("c-unit").value;
  const count = document.getElementById("c-count").value;
  const mode = document.getElementById("c-mode").value;
  const group = document.getElementById("c-group").value;
  const eff = document.querySelector('input[name="eff"]:checked').value;
  const max = document.getElementById("c-max").value;
  const appIds = Array.from(document.querySelectorAll('.app-check:checked')).map(i=>i.value);
  const d = { adminKey:token, name, duration, unit, count, authMode:mode, groupId:group, appIds, effectiveMode:eff, maxDevices:max };
  const r = await fetch(API+"/admin/cards/add", { method:"POST", body:JSON.stringify(d) });
  const j = await r.json();
  alert("生成成功："+j.cards.join("\n"));
  loadList();
}

async function batch(act) {
  const ids = Array.from(document.querySelectorAll('.card-item:checked')).map(i=>i.value);
  if (!ids.length) return alert("请选择");
  await fetch(API+"/admin/cards/batch", { method:"POST", body:JSON.stringify({adminKey:token, ids, act}) });
  loadList();
}

async function renew(card) {
  const d = prompt("续期时长（数字）");
  const u = prompt("单位 day/hour/minute");
  await fetch(API+"/admin/cards/renew", { method:"POST", body:JSON.stringify({adminKey:token, card, d, unit:u}) });
  loadList();
}

async function loadLogs() {
  const r = await fetch(API+"/admin/logs", { method:"POST", body:JSON.stringify({adminKey:token}) });
  const j = await r.json();
  document.getElementById("logs").innerHTML = `<table class="table">
    <tr><th>操作</th><th>目标</th><th>IP</th><th>时间</th></tr>
    ${j.data.map(l=>`<tr>
      <td>${l.action}</td>
      <td>${l.target}</td>
      <td>${l.ip}</td>
      <td>${new Date(l.create_time).toLocaleString()}</td>
    </tr>`).join("")}
  </table>`;
}

function exportCards() {
  const cards = Array.from(document.querySelectorAll('.card-item:checked')).map(i=>i.value);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([cards.join("\n")],{type:"text/plain"}));
  a.download = "cards.txt";
  a.click();
}
</script>
</body>
</html>
