<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>52霖科技 - 卡密管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
    :root { --primary: #ff69b4; --primary-dark: #ff1493; --bg: #fdf2f8; --card-bg: rgba(255,255,255,0.95); --text: #333; --text-light: #666; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --border: rgba(255,105,180,0.3); }
    body { background: linear-gradient(135deg, #fdf2f8 0%, #e9d5ff 100%); min-height: 100vh; padding: 20px; color: var(--text); }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; padding: 20px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(255,105,180,0.2); }
    .header h1 { color: var(--primary-dark); font-size: 28px; margin-bottom: 10px; }
    .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(255,105,180,0.2); }
    .login-box h2 { text-align: center; color: var(--primary-dark); margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text); }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.8); transition: all 0.3s; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .card { padding: 20px; background: var(--card-bg); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
    .stat-item { padding: 15px; background: rgba(255,105,180,0.1); border-radius: 12px; text-align: center; }
    .stat-item .num { font-size: 24px; font-weight: bold; color: var(--primary-dark); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-item { padding: 10px 20px; background: rgba(255,105,180,0.1); border-radius: 8px; cursor: pointer; }
    .tab-item.active { background: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<script>
// ==============================================
// 只改这一行！填入你的 Workers 地址
const API_BASE_URL = "https://kimi.8888888.best";
// ==============================================
let adminKey = localStorage.getItem("adminKey") || "";
let currentPage = 1;
let pageSize = 50;
</script>

<div id="loginPage" class="login-box">
  <h2>管理后台登录</h2>
  <div class="form-group">
    <label>管理员密钥</label>
    <input type="password" id="adminKeyInput" value="18347888666">
  </div>
  <button class="btn btn-primary" style="width:100%" onclick="login()">登录</button>
</div>

<div id="mainPage" style="display:none">
  <div class="header">
    <h1>卡密管理系统</h1>
    <button class="btn btn-warning" onclick="logout()">退出登录</button>
  </div>

  <div class="tabs">
    <div class="tab-item active" onclick="switchTab('cardManage')">卡密管理</div>
    <div class="tab-item" onclick="switchTab('cardGenerate')">生成卡密</div>
    <div class="tab-item" onclick="switchTab('groupManage')">APP分组</div>
    <div class="tab-item" onclick="switchTab('noticeManage')">公告管理</div>
  </div>

  <div id="cardManage" class="tab-content active">
    <div class="card">
      <h3>卡密列表</h3>
      <button class="btn btn-primary" onclick="loadCardList()">刷新</button>
      <table>
        <thead>
          <tr><th>卡密</th><th>名称</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="cardTable"></tbody>
      </table>
    </div>
  </div>

  <div id="cardGenerate" class="tab-content">
    <div class="card">
      <h3>生成卡密</h3>
      <div class="form-group">
        <label>名称</label><input id="cardName" value="月卡">
      </div>
      <div class="form-group">
        <label>天数</label><input type="number" id="cardDuration" value="30">
      </div>
      <button class="btn btn-primary" onclick="generateCards()">生成</button>
    </div>
  </div>
</div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}
async function login() {
  const key = document.getElementById("adminKeyInput").value;
  const res = await fetch(API_BASE_URL+"/admin/login", {method:"POST",body:JSON.stringify({adminKey:key})});
  const data = await res.json();
  if(data.code===200){adminKey=key;localStorage.setItem("adminKey",key);document.getElementById("loginPage").style.display="none";document.getElementById("mainPage").style.display="block";loadCardList();}
}
function logout(){localStorage.removeItem("adminKey");location.reload();}
async function loadCardList(){/* 完整逻辑在完整代码中，这里保留精简版 */}
async function generateCards(){/* 完整逻辑在完整代码中 */}
</script>
</body>
</html>
