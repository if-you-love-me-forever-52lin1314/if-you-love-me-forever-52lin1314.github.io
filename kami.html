<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52霖科技 - 旗舰版卡密系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #fff5f7; font-family: system-ui; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,192,203,0.3); border-radius: 20px; }
        .pink-btn { background: linear-gradient(135deg, #ff75c3 0%, #ffa647 100%); transition: all 0.3s; }
        .pink-btn:hover { transform: scale(1.02); opacity: 0.9; }
        /* 爱心特效 */
        .heart { position: fixed; pointer-events: none; z-index: -1; animation: float 4s linear infinite; color: #ff85a2; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen">
    <div id="loginBox" class="flex h-screen items-center justify-center p-4">
        <div class="glass p-8 w-full max-w-sm shadow-2xl text-center">
            <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-heart text-pink-500 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">后台管理登录</h1>
            <input type="password" id="adminKey" class="w-full p-3 rounded-xl border-2 border-pink-100 focus:border-pink-400 outline-none mb-4" placeholder="请输入管理员密钥">
            <button onclick="login()" class="w-full pink-btn text-white py-3 rounded-xl font-bold shadow-lg">验证并进入</button>
        </div>
    </div>

    <div id="mainUI" class="hidden container mx-auto p-4 lg:p-8">
        <nav class="flex space-x-2 mb-8 overflow-x-auto pb-2">
            <button onclick="showT('list')" class="px-6 py-2 glass font-bold text-pink-600 whitespace-nowrap">卡密管理</button>
            <button onclick="showT('add')" class="px-6 py-2 glass font-bold text-pink-600 whitespace-nowrap">开卡中心</button>
            <button onclick="showT('group')" class="px-6 py-2 glass font-bold text-pink-600 whitespace-nowrap">分组/APP设置</button>
        </nav>

        <div id="t-list" class="tab-c glass p-6 shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-pink-500 border-b-2 border-pink-50">
                            <th class="p-3">卡密信息</th>
                            <th class="p-3">授权目标</th>
                            <th class="p-3">时间进度</th>
                            <th class="p-3">绑定机器</th>
                            <th class="p-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="t-add" class="tab-c hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8">
                <h2 class="text-xl font-bold text-pink-600 mb-6">生成新卡密</h2>
                <div class="space-y-4">
                    <input id="a_name" class="w-full p-3 border-b-2 outline-none" placeholder="卡密备注 (如: 月卡用户)">
                    <div class="flex items-center space-x-2">
                        <input id="a_min" type="number" class="flex-1 p-3 border-b-2 outline-none" placeholder="授权时长">
                        <select id="a_unit" class="p-3 bg-transparent font-bold">
                            <option value="1">分钟</option>
                            <option value="60">小时</option>
                            <option value="1440">天</option>
                            <option value="525600">年</option>
                        </select>
                    </div>
                    <input id="a_count" type="number" value="1" class="w-full p-3 border-b-2 outline-none" placeholder="生成数量">
                    <button onclick="addCards()" class="w-full pink-btn text-white py-4 rounded-2xl font-bold text-lg shadow-xl mt-4">立即批量生成</button>
                </div>
            </div>
            <div class="glass p-8">
                <h2 class="text-xl font-bold text-pink-600 mb-4">选择授权范围</h2>
                <div class="mb-4">
                    <p class="text-xs text-gray-400 mb-2 font-bold">优先使用分组授权:</p>
                    <select id="a_gid" class="w-full p-3 border rounded-xl bg-pink-50 focus:ring-2 ring-pink-200 outline-none">
                        <option value="">-- 不使用分组，采用下方单选 --</option>
                    </select>
                </div>
                <p class="text-xs text-gray-400 mb-2 font-bold">手动单选 APP ID:</p>
                <div id="appBox" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>

        <div id="t-group" class="tab-c hidden glass p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-pink-600">APP 与分组管理</h2>
                <button onclick="addG()" class="bg-pink-100 text-pink-600 px-4 py-2 rounded-lg font-bold">+ 新增分组</button>
            </div>
            <div id="gList" class="space-y-4"></div>
            <button onclick="saveG()" class="w-full pink-btn text-white py-3 rounded-xl mt-8 font-bold">保存并同步配置</button>
        </div>
    </div>

    <script>
        const API = "https://kami.8888888.best"; // 换成你的
        let pass = "";
        let apps = ["App_01", "App_02", "App_03", "App_04", "App_05", "App_06", "App_07", "App_08"];
        let groups = [];

        // 初始化 APP 勾选框
        document.getElementById('appBox').innerHTML = apps.map(a => `
            <label class="flex items-center p-2 bg-white rounded-lg border hover:border-pink-300 cursor-pointer transition-all">
                <input type="checkbox" name="apps" value="${a}" class="w-4 h-4 accent-pink-500 mr-2">
                <span class="text-sm text-gray-600">${a}</span>
            </label>
        `).join('');

        async function login() {
            pass = document.getElementById('adminKey').value;
            load();
        }

        async function load() {
            const r = await fetch(`${API}/admin/cards/list`, { method:'POST', body:JSON.stringify({adminKey:pass})});
            const d = await r.json();
            if(d.code !== 200) return alert("验证失败");
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            render(d.data);
        }

        function render(data) {
            groups = data.appGroups;
            // 列表
            document.getElementById('listBody').innerHTML = data.list.map(c => `
                <tr class="border-b border-pink-50 hover:bg-pink-50/50">
                    <td class="p-3"><b class="text-pink-600 font-mono select-all">${c.card_key}</b><br><span class="text-gray-400 text-xs">${c.name||'无备注'}</span></td>
                    <td class="p-3 text-xs">${c.auth_mode==='group'?'<span class="bg-blue-100 p-1 rounded">组:'+c.app_group_id+'</span>':'单APP'}</td>
                    <td class="p-3 text-xs text-gray-500">开：${new Date(c.create_time).toLocaleString()}<br>激：${c.activate_time?new Date(c.activate_time).toLocaleString():'<span class="text-pink-400">未激活</span>'}</td>
                    <td class="p-3 font-mono text-xs text-gray-400">${c.device_id||'--'}</td>
                    <td class="p-3">
                        <span class="font-bold ${c.status==='normal'?'text-green-500':'text-red-500'}">${c.status==='normal'?'使用中':'已封禁'}</span>
                        <div class="mt-1 space-x-2">
                            <button onclick="act('${c.card_key}','${c.status==='normal'?'banned':'normal'}')" class="text-blue-400">切换</button>
                            <button onclick="act('${c.card_key}','delete')" class="text-red-300">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // 下拉
            document.getElementById('a_gid').innerHTML = '<option value="">-- 不使用分组，采用下方单选 --</option>' + groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');

            // 分组编辑
            document.getElementById('gList').innerHTML = groups.map((g,i)=>`
                <div class="glass p-4 border-l-4 border-pink-400">
                    <div class="grid grid-cols-2 gap-4 mb-2">
                        <input class="bg-transparent border-b font-bold" onchange="groups[${i}].id=this.value" value="${g.id}" placeholder="ID">
                        <input class="bg-transparent border-b" onchange="groups[${i}].name=this.value" value="${g.name}" placeholder="组名">
                    </div>
                    <input class="w-full text-xs text-gray-400 bg-transparent" onchange="groups[${i}].app_ids=this.value.split(',')" value="${JSON.parse(g.app_ids).join(',')}" placeholder="APP ID 逗号隔开">
                </div>
            `).join('');
        }

        async function addCards() {
            const chk = Array.from(document.querySelectorAll('input[name="apps"]:checked')).map(e=>e.value);
            const b = {
                adminKey: pass,
                cardName: document.getElementById('a_name').value,
                minutes: document.getElementById('a_min').value * document.getElementById('a_unit').value,
                count: document.getElementById('a_count').value,
                authMode: document.getElementById('a_gid').value ? 'group' : 'single',
                appGroupId: document.getElementById('a_gid').value,
                authAppIds: chk
            };
            await fetch(`${API}/admin/cards/add`, {method:'POST', body:JSON.stringify(b)});
            load();
            alert("生成成功！");
        }

        async function act(k,a) {
            if(a==='delete' && !confirm("确定删除?")) return;
            await fetch(`${API}/admin/cards/action`, {method:'POST', body:JSON.stringify({adminKey:pass, card:k, action:a})});
            load();
        }

        function addG() { groups.push({id:'NEW', name:'新分组', app_ids:[]}); render({list:[], appGroups:groups}); }
        async function saveG() {
            await fetch(`${API}/admin/group-save`, {method:'POST', body:JSON.stringify({adminKey:pass, groups:groups})});
            alert("分组已同步");
            load();
        }

        function showT(t) {
            document.querySelectorAll('.tab-c').forEach(e=>e.classList.add('hidden'));
            document.getElementById('t-'+t).classList.remove('hidden');
        }

        // 浪漫爱心生成
        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 400);
    </script>
</body>
</html>
