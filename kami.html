<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>52霖科技-卡密管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#ffc8dd 0%,#ffafcc 50%,#fcd5ce 100%);min-height:100vh;padding:20px}
.heart{position:fixed;width:14px;height:14px;background:#ff4d6d;transform:rotate(45deg);animation:heartFly 7s linear infinite;z-index:0;opacity:0.7}
.heart:before,.heart:after{content:"";position:absolute;width:14px;height:14px;background:inherit;border-radius:50%}
.heart:before{top:-7px;left:0}
.heart:after{left:-7px;top:0}
@keyframes heartFly{0%{transform:translateY(100vh) rotate(45deg);opacity:0.8}100%{transform:translateY(-10vh) rotate(405deg);opacity:0}}
.container{max-width:1400px;margin:0 auto;position:relative;z-index:1}
.card{background:rgba(255,255,255,0.9);border-radius:20px;padding:24px;margin-bottom:20px}
.tabs{display:flex;gap:12px;margin-bottom:20px}
.tab{padding:12px 24px;border-radius:14px;background:#fff;cursor:pointer;border:none}
.tab.active{background:#ff4d6d;color:white}
.btn{padding:10px 18px;border:none;border-radius:12px;background:#ff4d6d;color:white;cursor:pointer;margin:4px}
.btn-green{background:#2ec4b6}
.btn-red{background:#e71d36}
input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin:8px 0}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:10px 0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
.modal-box{background:white;padding:24px;border-radius:16px;min-width:450px}
</style>
</head>
<body>
<script>
function addHeart(){const h=document.createElement("div");h.className="heart";h.style.left=Math.random()*100+"vw";document.body.appendChild(h);setTimeout(()=>h.remove(),7000)}
setInterval(addHeart,400);
</script>

<!-- ============================== ✅ 只在这里修改APP！！！============================== -->
<script>
// 新增、删除、修改APP 全程只改这里！！！
const GLOBAL_APP_LIST = [
  { id: "APP1", name: "52霖影视" },
  { id: "APP2", name: "52霖漫画" },
  { id: "APP3", name: "52霖小说" },
  { id: "APP4", name: "52霖动漫" },
  { id: "APP5", name: "52霖短剧" },
  { id: "APP6", name: "52霖音乐" },
  { id: "APP7", name: "52霖游戏" },
  { id: "APP8", name: "52霖工具" }
];
</script>
<!-- ===================================================================================== -->

<div class="modal" id="loginModal" style="display:flex">
  <div class="modal-box">
    <h2 style="color:#ff4d6d;text-align:center">🔐 管理员登录</h2>
    <input type="password" id="adminPwd" placeholder="输入管理员密钥">
    <button class="btn" style="width:100%" onclick="adminLogin()">登录</button>
  </div>
</div>

<div class="container" id="mainPage" style="display:none">
  <div class="card">
    <h1 style="color:#ff4d6d;margin-bottom:16px">💕 52霖科技 卡密管理系统</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">卡密管理</button>
      <button class="tab" onclick="switchTab(1)">生成卡密</button>
      <button class="tab" onclick="switchTab(2)">APP分组</button>
      <button class="tab" onclick="switchTab(3)">操作日志</button>
    </div>
  </div>

  <div id="tab0">
    <div class="card">
      <button class="btn btn-red" onclick="batchOpt('del')">批量删除</button>
      <button class="btn" onclick="batchOpt('ban')">批量封禁</button>
      <button class="btn btn-green" onclick="batchOpt('unban')">批量解封</button>
      <button class="btn" onclick="exportAll()">导出全部卡密</button>
      <button class="btn" onclick="loadCards()">刷新列表</button>
    </div>
    <div class="card"><table id="cardTable"></table></div>
  </div>

  <div id="tab1" style="display:none">
    <div class="card">
      <h3>✨ 批量生成卡密</h3>
      <input id="cardName" placeholder="自定义卡密名称">
      <input id="cardPrefix" placeholder="自定义卡密前缀（可选）">
      <input id="cardSuffix" placeholder="自定义卡密后缀（可选）">
      <div style="display:flex;gap:10px">
        <input id="genDuration" type="number" placeholder="有效期时长" style="flex:1">
        <select id="genUnit" style="width:150px">
          <option value="minute">分钟</option>
          <option value="hour">小时</option>
          <option value="day" selected>天</option>
        </select>
      </div>
      <input id="genCount" type="number" placeholder="批量生成数量" value="1">
      <select id="authMode" onchange="modeChange()">
        <option value="app">单APP授权</option>
        <option value="group">分组授权</option>
      </select>
      <div id="appCheckBoxWrap" class="check-grid"></div>
      <select id="groupSelect" style="display:none"></select>
      <div style="display:flex;gap:10px">
        <label><input type="radio" name="effTime" value="create" checked> 创建立即生效</label>
        <label><input type="radio" name="effTime" value="activate"> 首次激活生效</label>
      </div>
      <input id="maxDevice" type="number" placeholder="最大绑定设备数 0=不限" value="0">
      <button class="btn" style="width:100%;margin-top:10px" onclick="createCard()">一键批量生成</button>
    </div>
  </div>

  <div id="tab2" style="display:none">
    <div class="card">
      <h3>📁 APP分组管理</h3>
      <input id="newGroupId" placeholder="自定义分组ID（对接APP必填）">
      <input id="newGroupName" placeholder="分组名称">
      <div id="groupAppCheck" class="check-grid"></div>
      <button class="btn btn-green" onclick="saveGroup()">保存分组</button>
    </div>
    <div class="card" id="groupListBox"></div>
  </div>

  <div id="tab3" style="display:none">
    <div class="card"><table id="logTable"></table></div>
  </div>
</div>

<script>
const API = "/api";
let adminKey = "";

async function adminLogin(){
  const pwd = document.getElementById("adminPwd").value;
  const res = await fetch(API+"/admin/login",{method:"POST",body:JSON.stringify({adminKey:pwd})});
  const j = await res.json();
  if(j.code===200){ adminKey = pwd; document.getElementById("loginModal").style.display="none"; document.getElementById("mainPage").style.display="block"; initPage(); }
  else alert("密钥错误！");
}

// 渲染APP复选框
function renderAppCheck(){
  let html = "";
  GLOBAL_APP_LIST.forEach(app=>{
    html += `<label><input type="checkbox" class="appCheckItem" value="${app.id}"> ${app.name} (ID:${app.id})</label>`
  })
  document.getElementById("appCheckBoxWrap").innerHTML = html;
  document.getElementById("groupAppCheck").innerHTML = html;
}

async function initPage(){ renderAppCheck(); await loadGroups(); await loadCards(); }
function switchTab(i){
  document.querySelectorAll(".tab").forEach((e,j)=>e.classList.toggle("active",j===i));
  document.querySelectorAll("#tab0,#tab1,#tab2,#tab3").forEach((e,j)=>e.style.display = j===i?"block":"none");
}
function modeChange(){
  const m = document.getElementById("authMode").value;
  document.getElementById("appCheckBoxWrap").style.display = m==="app"?"grid":"none";
  document.getElementById("groupSelect").style.display = m==="group"?"block":"none";
}

async function loadCards(){
  const res = await fetch(API+"/admin/card/list",{method:"POST",body:JSON.stringify({adminKey})});
  const list = (await res.json()).data || [];
  let html = `<tr><th>选择</th><th>卡密</th><th>名称</th><th>状态</th><th>激活状态</th><th>到期时间</th><th>操作</th></tr>`;
  list.forEach(c=>{
    html += `<tr>
      <td><input type="checkbox" class="cardCheck" value="${c.card}"></td>
      <td>${c.card}</td><td>${c.name}</td>
      <td>${c.status==="banned"?"封禁":"正常"}</td>
      <td>${c.isActive?"✅已激活":"⏳未激活"}</td>
      <td>${new Date(c.expireTime).toLocaleString()}</td>
      <td><button class="btn" onclick="renewCard('${c.card}')">续期</button></td>
    </tr>`
  })
  document.getElementById("cardTable").innerHTML = html;
}

async function batchOpt(action){
  const select = Array.from(document.querySelectorAll(".cardCheck:checked")).map(i=>i.value);
  if(!select.length) return alert("请先勾选卡密！");
  await fetch(API+"/admin/card/batch",{method:"POST",body:JSON.stringify({adminKey,cardList:select,action})});
  loadCards();
}

async function renewCard(card){
  const num = prompt("输入续期时长");
  const unit = prompt("输入单位 minute/hour/day");
  await fetch(API+"/admin/card/renew",{method:"POST",body:JSON.stringify({adminKey,card,num,unit})});
  loadCards();
}

async function createCard(){
  const name = document.getElementById("cardName").value;
  const prefix = document.getElementById("cardPrefix").value;
  const suffix = document.getElementById("cardSuffix").value;
  const duration = document.getElementById("genDuration").value;
  const unit = document.getElementById("genUnit").value;
  const count = document.getElementById("genCount").value;
  const authMode = document.getElementById("authMode").value;
  const effMode = document.querySelector('input[name="effTime"]:checked').value;
  const maxD = document.getElementById("maxDevice").value;
  const appIds = Array.from(document.querySelectorAll(".appCheckItem:checked")).map(i=>i.value);
  const groupId = document.getElementById("groupSelect").value;

  const res = await fetch(API+"/admin/card/create",{
    method:"POST",body:JSON.stringify({adminKey,cardName:name,prefix,suffix,duration,unit,count,authMode,effMode,maxDevice:maxD,appIds,groupId})
  })
  const j = await res.json();
  alert(`生成成功！\n${j.cards.join("\n")}`); loadCards();
}

async function loadGroups(){
  const res = await fetch(API+"/admin/group/all",{method:"POST",body:JSON.stringify({adminKey})});
  const groups = (await res.json()).data || [];
  let optHtml = `<option value="">请选择分组</option>`;
  groups.forEach(g=>optHtml += `<option value="${g.group_id}">${g.name}</option>`);
  document.getElementById("groupSelect").innerHTML = optHtml;
}

async function saveGroup(){
  const gid = document.getElementById("newGroupId").value;
  const gname = document.getElementById("newGroupName").value;
  const appIds = Array.from(document.querySelectorAll('#groupAppCheck input:checked')).map(i=>i.value);
  await fetch(API+"/admin/group/save",{method:"POST",body:JSON.stringify({adminKey,groupId:gid,groupName:gname,appIds})});
  alert("分组保存成功！"); loadGroups();
}

async function exportAll(){
  const res = await fetch(API+"/admin/card/export",{method:"POST",body:JSON.stringify({adminKey})});
  const list = (await res.json()).data || [];
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([list.join("\n")]));
  a.download = "全部卡密.txt"; a.click();
}
</script>
</body>
</html>
