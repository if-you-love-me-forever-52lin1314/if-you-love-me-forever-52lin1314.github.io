<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>52霖科技 - 炫酷卡密管理</title>
  <style>
    :root { --primary: #ff758c; --bg: #0f0c29; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 1200px; margin: 50px auto; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    h1 { text-align: center; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    input, select { padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-add { background: var(--primary); color: white; }
    .btn-del { background: #ff4b2b; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: rgba(255, 117, 140, 0.3); padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
    .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; } /* 今日已登录状态 */
    .offline { background: #555; }
    .days-edit { cursor: pointer; text-decoration: underline; color: #ffeb3b; }
    tr:hover { background: rgba(255,255,255,0.05); }
    .stats { margin-bottom: 20px; font-size: 14px; color: #ccc; }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>

  <div class="container">
    <h1>💖 52霖科技卡密管理系统 💖</h1>
    
    <div id="loginSection">
      <input type="password" id="adminKey" placeholder="输入管理员密钥...">
      <button class="btn btn-add" onclick="fetchList()">登录管理</button>
    </div>

    <div id="adminSection" style="display:none;">
      <div class="stats">
        总卡密：<span id="statTotal">0</span> | 今日活跃：<span id="statOnline">0</span>
      </div>

      <div class="input-group">
        <input type="text" id="cardName" placeholder="卡密名称(如月卡)">
        <input type="number" id="days" placeholder="天数" style="width:70px;">
        <input type="number" id="count" placeholder="生成数量" style="width:70px;">
        <input type="text" id="prefix" placeholder="前缀" style="width:70px;">
        <button class="btn btn-add" onclick="addCards()">批量生成</button>
        <button class="btn btn-del" onclick="batchDelete()">批量删除勾选</button>
      </div>

      <table>
        <thead>
          <tr>
            <th><input type="checkbox" onclick="toggleAll(this)"></th>
            <th>卡密内容</th>
            <th>名称</th>
            <th>设定时长(天)</th>
            <th>状态</th>
            <th>激活/到期时间</th>
            <th>今日状态</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "https://kami.8888888.best"; // [修改这里] 填你的 Worker URL

    async function fetchList() {
      const adminKey = document.getElementById('adminKey').value;
      const res = await fetch(`${API}/admin/list`, {
        method: 'POST',
        body: JSON.stringify({ adminKey })
      });
      const data = await res.json();
      if(data.code !== 200) return alert(data.msg);

      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminSection').style.display = 'block';
      document.getElementById('statTotal').innerText = data.stats.total;
      document.getElementById('statOnline').innerText = data.stats.onlineToday;

      const body = document.getElementById('listBody');
      const todayStart = new Date().setHours(0,0,0,0);
      
      body.innerHTML = data.data.map(item => `
        <tr>
          <td><input type="checkbox" class="row-check" value="${item.card_key}"></td>
          <td>${item.card_key}</td>
          <td>${item.name}</td>
          <td class="days-edit" onclick="updateDays('${item.card_key}', ${item.days})">${item.days}天</td>
          <td>${item.device_id ? '已激活' : '<span style="color:#aaa">未激活</span>'}</td>
          <td>${item.expire_time > 0 ? new Date(item.expire_time).toLocaleDateString() : '尚未开始计时'}</td>
          <td>
            <span class="status-dot ${item.last_online_time > todayStart ? 'online' : 'offline'}"></span>
            ${item.last_online_time > todayStart ? '今日活跃' : '离线'}
          </td>
        </tr>
      `).join('');
    }

    async function addCards() {
      const body = {
        adminKey: document.getElementById('adminKey').value,
        cardName: document.getElementById('cardName').value,
        days: parseInt(document.getElementById('days').value),
        count: parseInt(document.getElementById('count').value),
        prefix: document.getElementById('prefix').value
      };
      await fetch(`${API}/admin/add`, { method: 'POST', body: JSON.stringify(body) });
      fetchList();
    }

    async function updateDays(key, old) {
      const newDays = prompt(`修改 [${key}] 的时长：`, old);
      if(!newDays || newDays == old) return;
      await fetch(`${API}/admin/update-days`, {
        method: 'POST',
        body: JSON.stringify({ adminKey: document.getElementById('adminKey').value, key, newDays: parseInt(newDays) })
      });
      fetchList();
    }

    async function batchDelete() {
      const keys = Array.from(document.querySelectorAll('.row-check:checked')).map(el => el.value);
      if(keys.length === 0 || !confirm('确定删除选中的卡密吗？')) return;
      await fetch(`${API}/admin/batch-delete`, {
        method: 'POST',
        body: JSON.stringify({ adminKey: document.getElementById('adminKey').value, keys })
      });
      fetchList();
    }

    function toggleAll(source) {
      document.querySelectorAll('.row-check').forEach(el => el.checked = source.checked);
    }

    // --- 爱心飘落动画 ---
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const hearts = [];
    class Heart {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -20;
        this.size = Math.random() * 15 + 10;
        this.speed = Math.random() * 2 + 1;
        this.opacity = Math.random() * 0.5 + 0.3;
      }
      draw() {
        ctx.fillStyle = `rgba(255, 117, 140, ${this.opacity})`;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
        ctx.bezierCurveTo(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
        ctx.fill();
      }
      update() { this.y += this.speed; if(this.y > canvas.height) this.y = -20; }
    }
    for(let i=0; i<50; i++) hearts.push(new Heart());
    function animate() {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      hearts.forEach(h => { h.update(); h.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
